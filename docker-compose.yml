version: "3.9"

services:

  # ── PostgreSQL + PostGIS ──
  postgres:
    image: postgis/postgis:16-3.4
    container_name: saferoads_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-saferoads}
      POSTGRES_USER: ${DB_USER:-saferoads_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme_securise}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-saferoads_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── API FastAPI ──
  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    container_name: saferoads_api
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models:ro
      - ./data/processed:/app/data/processed:ro
    depends_on:
      postgres:
        condition: service_healthy

  # ── Jupyter (développement) ──
  jupyter:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.jupyter
    container_name: saferoads_jupyter
    restart: unless-stopped
    ports:
      - "8888:8888"
    volumes:
      - .:/home/jovyan/work
    profiles:
      - dev

volumes:
  pgdata:
